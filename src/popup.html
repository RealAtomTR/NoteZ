<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoteZ - Popup</title>
  <script src="js/electron-mock.js"></script>
  <link rel="stylesheet" href="styles/variables.css">
  <link rel="stylesheet" href="styles/popup.css">
  <style>
    .popup-deadline-badge {
      font-size: var(--font-size-xs);
      padding: 2px 6px;
      border-radius: var(--border-radius-sm);
      font-weight: bold;
      margin-left: 8px;
    }
    .deadline-expired {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
    }
    .deadline-today {
      color: #ef4444;
      font-weight: 800;
      animation: pulse 1.5s infinite ease-in-out;
      display: inline-block;
    }
    .deadline-3days {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
    }
    .deadline-1week {
      background: rgba(245, 166, 35, 0.1);
      color: #f5a623;
    }
    .deadline-2weeks {
      background: rgba(0, 194, 209, 0.1);
      color: #00c2d1;
    }
    .popup-importance-badge {
      font-size: 20px;
      font-weight: 900;
      padding: 6px 14px;
      border-radius: 20px;
      margin-right: 8px;
      display: inline-block;
      text-align: center;
      border: 2px solid currentColor;
      text-shadow: 0 0 8px currentColor;
      transition: all 0.3s ease;
    }
    .imp-green {
      color: #00ff66;
      background: rgba(0, 255, 102, 0.15);
      box-shadow: 0 0 15px rgba(0, 255, 102, 0.5);
    }
    .imp-amber {
      color: #ffaa00;
      background: rgba(255, 170, 0, 0.2);
      box-shadow: 0 0 15px rgba(255, 170, 0, 0.5);
    }
    .imp-red {
      color: #ff2222;
      background: rgba(255, 34, 34, 0.2);
      box-shadow: 0 0 15px rgba(255, 34, 34, 0.5);
    }
    .imp-darkred {
      color: #ff0000;
      font-weight: 900;
      background: rgba(255, 0, 0, 0.3);
      box-shadow: 0 0 25px rgba(255, 0, 0, 0.9), inset 0 0 12px rgba(255, 0, 0, 0.5);
      animation: badgePulse 1.0s infinite ease-in-out;
      display: inline-block;
    }
    .popup-timer-pill {
      background: rgba(0, 194, 209, 0.15);
      color: #00c2d1;
      border: 1px solid rgba(0, 194, 209, 0.3);
      padding: 2px 8px;
      border-radius: 12px;
      font-size: var(--font-size-xs);
      font-weight: bold;
      animation: pulse 1.5s infinite ease-in-out;
      display: inline-block;
    }
    .snooze-limit-info {
      font-size: 11px;
      color: var(--text-secondary);
      text-align: center;
      margin-top: var(--spacing-sm);
      margin-bottom: var(--spacing-xs);
      width: 100%;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.85; }
    }
    @keyframes badgePulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 0, 0, 0.9), inset 0 0 10px rgba(255, 0, 0, 0.5); }
      50% { transform: scale(1.15); box-shadow: 0 0 35px rgba(255, 0, 0, 1), inset 0 0 15px rgba(255, 0, 0, 0.7); }
    }
    .dismiss-reasons {
      display: grid !important;
      grid-template-columns: 1fr 1fr !important;
      gap: 8px !important;
      margin-top: var(--spacing-md) !important;
      width: 100% !important;
      box-sizing: border-box !important;
    }
    .dismiss-reasons .reason-btn {
      width: 100% !important;
      box-sizing: border-box !important;
      padding: 8px 10px !important;
      text-align: center !important;
      font-size: 11px !important;
    }
  </style>
</head>
<body>
  <div class="popup-card" id="popup-container">
    <div class="popup-header">
      <div style="display: flex; align-items: center; gap: 8px;">
        <span id="popup-timer-pill" class="popup-timer-pill" style="display: none;">05:00</span>
        <span class="category-name" id="category-name">Kategori</span>
        <span id="popup-deadline-badge" class="popup-deadline-badge" style="display: none;"></span>
      </div>
      <div style="display: flex; align-items: center; gap: 8px;">
        <span id="popup-importance-badge" class="popup-importance-badge" style="display: none;"></span>
        <span class="category-color-dot" id="category-color"></span>
      </div>
    </div>
    
    <div class="popup-content">
      <p id="tip-content">Not içeriği buraya gelecek...</p>
    </div>
    
    <!-- Progress bar for levels 4-6 -->
    <div class="progress-container" id="progress-container" style="display: none;">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    
    <!-- Wordle game for levels 6-9 -->
    <div class="wordle-container" id="wordle-container" style="display: none;">
      <p id="wordle-message" class="wordle-message">Kelimeyi bul, dismiss et!</p>
      <div id="wordle-grid" class="wordle-grid"></div>
      <div id="wordle-keyboard" class="wordle-keyboard"></div>
    </div>

    <!-- Chess game for level 10 -->
    <div class="chess-container" id="chess-container" style="display: none;">
      <p id="chess-message" class="chess-message">Şah mat et, dismiss et! (Beyaz Hamle Yapar)</p>
      <div id="chess-board" class="chess-board"></div>
    </div>

    <!-- Math question for levels 7-9 -->
    <div class="math-question" id="math-question" style="display: none;">
      <p id="math-problem">Soruyu çöz: </p>
      <input type="number" id="math-answer" placeholder="Cevabınız">
      <button id="math-submit">Cevapla</button>
    </div>
    
    <!-- Confetti canvas for level 10 -->
    <canvas id="confetti-canvas" style="display: none;"></canvas>
    <!-- Compact countdown screen -->
    <div class="timer-screen" id="timer-screen" style="display: none;">
      <div class="timer-screen-label">Geri sayım</div>
      <div class="timer-screen-time" id="timer-screen-time">05:00</div>
      <button id="timer-done-btn" class="btn-primary">Bitti</button>
    </div>
    
    <!-- "Not Bitirildi" Screen -->
    <div class="not-bitirildi-screen" id="not-bitirildi-screen" style="display: none;">
      <div class="congrats-icon">✓</div>
      <h2>Tebrikler!</h2>
      <p>Not Tamamlandı mı?</p>
      <div class="not-content-box">
        <span id="not-bitirildi-content">Not içeriği...</span>
      </div>
      <div class="not-bitirildi-actions">
        <button id="not-bitirildi-done" class="btn-primary">Tamamlandı</button>
        <button id="not-bitirildi-continue" class="btn-secondary">Hayır</button>
        <button id="not-bitirildi-more" class="btn-cyan" style="display: none;">5 Dakika Daha</button>
      </div>
    </div>

    <!-- Follow-up question for timer end -->
    <div class="follow-up-question" id="follow-up-question" style="display: none;">
      <p>Devam ettin mi?</p>
      <div class="follow-up-actions">
        <button id="follow-up-yes" class="btn-primary">Evet</button>
        <button id="follow-up-no" class="btn-secondary">Hayır</button>
      </div>
    </div>
    
    <div class="popup-actions" id="popup-actions">
      <button id="two-min-btn" class="btn-cyan">5 Dakika Yap</button>
      <button id="dismiss-btn" class="btn-primary">Dismiss</button>
    </div>
    
    <div id="snooze-limit-info" class="snooze-limit-info" style="display: none;"></div>
    <div class="dismiss-reasons" id="dismiss-reasons">
      <button class="reason-btn" data-reason="not_today">Bugün değil</button>
      <button class="reason-btn" data-reason="remind_1h">1 saat sonra hatırlat</button>
      <button class="reason-btn" data-reason="no_motivation">Motivasyon yok</button>
      <button class="reason-btn" data-reason="not_now">Şimdi değil</button>
    </div>
  </div>
  
  <script src="js/audio.js"></script>
  <script src="js/popup.js"></script>

</body>
</html>
