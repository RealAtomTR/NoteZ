<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoteZ — Günlük Giriş</title>
  <script src="js/electron-mock.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background: #f8f8ff; /* Snow white */
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      color: #1f2937;
      overflow: hidden;
      user-select: none;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
    }

    .titlebar {
      height: 28px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 0 16px;
      -webkit-app-region: drag;
      background: transparent;
    }

    .close-btn {
      font-size: 16px;
      color: #9ca3af;
      cursor: pointer;
      -webkit-app-region: no-drag;
      transition: color 150ms ease, transform 150ms ease;
      font-weight: bold;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    .close-btn:hover {
      color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
      transform: scale(1.05);
    }

    .window-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 16px 16px 16px;
    }

    /* Streak Header */
    .streak-section {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      -webkit-app-region: no-drag;
    }

    .streak-fire {
      font-size: 32px;
      animation: bounce-fire 2s infinite ease-in-out;
      display: inline-block;
    }

    @keyframes bounce-fire {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-4px) scale(1.08); }
    }

    .streak-info {
      text-align: left;
    }

    .streak-count {
      font-size: 20px;
      font-weight: 800;
      color: #1a1a2e;
      line-height: 1.2;
    }

    .streak-label {
      font-size: 11px;
      color: #6b7280;
      font-weight: 500;
    }

    /* Calendar Section */
    .calendar-section {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 4px 12px rgba(108, 71, 255, 0.03);
      display: flex;
      flex-direction: column;
      margin-bottom: 12px;
    }

    .calendar-title {
      font-size: 12px;
      font-weight: 700;
      color: #4b5563;
      margin-bottom: 8px;
      text-align: left;
    }

    .weekday-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      width: 100%;
      margin-bottom: 6px;
    }

    .weekday-name {
      text-align: center;
      font-size: 9px;
      font-weight: 700;
      color: #6c47ff; /* Violet Accent */
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      width: 100%;
      align-content: start;
    }

    /* Day circles */
    .day-cell {
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .day-circle {
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      transition: all 250ms cubic-bezier(0.4, 0, 0.2, 1);
      box-sizing: border-box;
    }

    /* Weekly view circle size */
    .weekly-view .day-circle {
      width: 32px;
      height: 32px;
      font-size: 12px;
    }

    /* Monthly view circle size */
    .monthly-view .day-circle {
      width: 24px;
      height: 24px;
      font-size: 9px;
    }

    /* Circle States */
    .day-circle.today-pending {
      border: 2px solid #6c47ff;
      color: #6c47ff;
      background: transparent;
      animation: pulse-today 1.5s infinite ease-in-out;
    }

    @keyframes pulse-today {
      0% { box-shadow: 0 0 0 0 rgba(108, 71, 255, 0.4); }
      70% { box-shadow: 0 0 0 5px rgba(108, 71, 255, 0); }
      100% { box-shadow: 0 0 0 0 rgba(108, 71, 255, 0); }
    }

    .day-circle.completed {
      background-color: #22c55e;
      color: white;
      border: 2px solid #22c55e;
      box-shadow: 0 2px 6px rgba(34, 197, 94, 0.25);
    }

    .day-circle.missed {
      border: 2px solid #ef4444;
      background-color: rgba(239, 68, 68, 0.06);
      color: #ef4444;
    }

    .day-circle.future {
      border: 1.5px dashed #d1d5db;
      color: #9ca3af;
      background: transparent;
    }

    .day-placeholder {
      width: 28px;
      height: 28px;
      visibility: hidden;
    }

    /* Success pop animation */
    .day-circle.completed.animate-checkin {
      animation: checkin-success-pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes checkin-success-pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.25); background-color: #22c55e; border-color: #22c55e; }
      100% { transform: scale(1); background-color: #22c55e; border-color: #22c55e; }
    }

    /* Actions Section */
    .action-section {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      -webkit-app-region: no-drag;
    }

    .info-msg {
      font-size: 12px;
      color: #4b5563;
      font-weight: 500;
      line-height: 1.4;
      text-align: center;
      min-height: 18px;
    }

    #checkin-btn {
      background: linear-gradient(135deg, #6c47ff, #8b5cf6);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      outline: none;
      transition: all 200ms ease;
      box-shadow: 0 4px 14px rgba(108, 71, 255, 0.35);
    }

    #checkin-btn:hover:not(:disabled) {
      box-shadow: 0 0 20px rgba(108, 71, 255, 0.65);
      transform: translateY(-2px);
    }

    #checkin-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    #checkin-btn:disabled {
      cursor: default;
    }

    #checkin-btn.success {
      background: #22c55e !important;
      box-shadow: 0 4px 20px rgba(34, 197, 94, 0.5) !important;
      color: white;
      animation: btn-success-pulse 1s ease-out;
    }

    @keyframes btn-success-pulse {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
      70% { transform: scale(1.05); box-shadow: 0 0 0 12px rgba(34, 197, 94, 0); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
    }

    #confetti-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 100;
      display: none;
    }
  </style>
</head>
<body>
  <div class="titlebar">
    <span class="close-btn" id="close-btn">✖</span>
  </div>

  <div class="window-container">
    <div class="streak-section">
      <span class="streak-fire">🔥</span>
      <div class="streak-info">
        <div class="streak-count" id="streak-num">0 Gün</div>
        <div class="streak-label">Günlük Seri</div>
      </div>
    </div>

    <div class="calendar-section">
      <div class="calendar-title" id="calendar-month-title">Yükleniyor...</div>
      <div class="weekday-header">
        <span class="weekday-name">Pzt</span>
        <span class="weekday-name">Sal</span>
        <span class="weekday-name">Çar</span>
        <span class="weekday-name">Per</span>
        <span class="weekday-name">Cum</span>
        <span class="weekday-name">Cmt</span>
        <span class="weekday-name">Paz</span>
      </div>
      <div class="calendar-grid" id="calendar-grid">
        <!-- Circles loaded dynamically -->
      </div>
    </div>

    <div class="action-section">
      <div class="info-msg" id="info-text">Yükleniyor...</div>
      <button id="checkin-btn" disabled>Giriş Yap</button>
    </div>
  </div>

  <script src="js/silent-audio.js"></script>
  <script>
    const btn = document.getElementById('checkin-btn');
    const infoMsg = document.getElementById('info-text');
    const closeBtn = document.getElementById('close-btn');

    // Timezone safe offset generator matching main.js
    function getOffsetDateStr(offset) {
      const d = new Date();
      d.setHours(0, 0, 0, 0);
      d.setDate(d.getDate() + offset);
      return d.toISOString().split('T')[0];
    }

    function getWeeklyDays() {
      const today = new Date();
      const currentDay = today.getDay();
      const distanceToMonday = currentDay === 0 ? -6 : 1 - currentDay;
      const dayNames = ['Pzt', 'Sal', 'Çar', 'Per', 'Cum', 'Cmt', 'Paz'];
      const days = [];
      
      for (let i = 0; i < 7; i++) {
        const offset = distanceToMonday + i;
        const dateStr = getOffsetDateStr(offset);
        
        const d = new Date();
        d.setHours(0, 0, 0, 0);
        d.setDate(d.getDate() + offset);
        
        const todayStr = getOffsetDateStr(0);
        const isToday = dateStr === todayStr;
        const isFuture = dateStr > todayStr;
        
        days.push({
          dateStr,
          dayName: dayNames[i],
          dayNum: d.getDate(),
          isToday,
          isFuture
        });
      }
      return days;
    }

    function getMonthlyDays() {
      const today = new Date();
      const year = today.getFullYear();
      const month = today.getMonth();
      
      const firstDay = new Date(year, month, 1);
      firstDay.setHours(0, 0, 0, 0);
      
      const startDayOfWeek = firstDay.getDay();
      const emptyCellsCount = startDayOfWeek === 0 ? 6 : startDayOfWeek - 1;
      
      const numDays = new Date(year, month + 1, 0).getDate();
      const todayNormalized = new Date();
      todayNormalized.setHours(0, 0, 0, 0);
      
      const days = [];
      
      // Placeholders to align 1st with correct weekday
      for (let i = 0; i < emptyCellsCount; i++) {
        days.push({ isPlaceholder: true });
      }
      
      // Actual days
      for (let i = 1; i <= numDays; i++) {
        const d = new Date(year, month, i);
        d.setHours(0, 0, 0, 0);
        
        const diffTime = d.getTime() - todayNormalized.getTime();
        const offset = Math.round(diffTime / (1000 * 60 * 60 * 24));
        
        const dateStr = getOffsetDateStr(offset);
        const todayStr = getOffsetDateStr(0);
        
        const isToday = dateStr === todayStr;
        const isFuture = dateStr > todayStr;
        
        days.push({
          isPlaceholder: false,
          dateStr,
          dayNum: i,
          isToday,
          isFuture
        });
      }
      
      return days;
    }

    function renderCalendar(streak, history) {
      const grid = document.getElementById('calendar-grid');
      const calendarTitle = document.getElementById('calendar-month-title');
      grid.innerHTML = '';
      
      const isWeekly = streak < 7;
      
      const locale = 'tr-TR';
      const monthName = new Date().toLocaleDateString(locale, { month: 'long', year: 'numeric' });
      calendarTitle.textContent = isWeekly ? 'Bu Haftaki İlerleme' : monthName;
      
      if (isWeekly) {
        grid.className = 'calendar-grid weekly-view';
        const days = getWeeklyDays();
        
        days.forEach(day => {
          const cell = document.createElement('div');
          cell.className = 'day-cell';
          
          const circle = document.createElement('div');
          circle.className = 'day-circle';
          circle.textContent = day.dayNum;
          
          const histItem = history.find(h => h.date === day.dateStr);
          const isCompleted = histItem ? histItem.completed : false;
          
          if (day.isToday) {
            circle.id = 'today-circle';
            if (isCompleted) {
              circle.className += ' completed';
            } else {
              circle.className += ' today-pending';
            }
          } else if (day.isFuture) {
            circle.className += ' future';
          } else {
            if (isCompleted) {
              circle.className += ' completed';
            } else {
              circle.className += ' missed';
            }
          }
          
          cell.appendChild(circle);
          grid.appendChild(cell);
        });
      } else {
        grid.className = 'calendar-grid monthly-view';
        const days = getMonthlyDays();
        
        days.forEach(day => {
          const cell = document.createElement('div');
          cell.className = 'day-cell';
          
          if (day.isPlaceholder) {
            const placeholder = document.createElement('div');
            placeholder.className = 'day-placeholder';
            cell.appendChild(placeholder);
          } else {
            const circle = document.createElement('div');
            circle.className = 'day-circle';
            circle.textContent = day.dayNum;
            
            const histItem = history.find(h => h.date === day.dateStr);
            const isCompleted = histItem ? histItem.completed : false;
            
            if (day.isToday) {
              circle.id = 'today-circle';
              if (isCompleted) {
                circle.className += ' completed';
              } else {
                circle.className += ' today-pending';
              }
            } else if (day.isFuture) {
              circle.className += ' future';
            } else {
              if (isCompleted) {
                circle.className += ' completed';
              } else {
                circle.className += ' missed';
              }
            }
            cell.appendChild(circle);
          }
          grid.appendChild(cell);
        });
      }
    }

    async function initialize() {
      let status = { completed: false, streak: 0 };
      let history = [];
      
      try {
        if (window.electronAPI) {
          status = await window.electronAPI.checkinStatus();
          history = await window.electronAPI.checkinHistory();
        }
      } catch (err) {
        console.error('Failed to load checkin data:', err);
      }
      
      // Initialize audio manager
      let settingsMap = {};
      try {
        if (window.electronAPI && window.electronAPI.dbQuery) {
          const settings = await window.electronAPI.dbQuery(`SELECT key, value FROM settings`);
          settings.forEach(setting => {
            settingsMap[setting.key] = setting.value;
          });
        }
      } catch (err) {
        console.error('Error loading audio settings in check-in window:', err);
      }

      if (window.audioManager) {
        try {
          await window.audioManager.initialize({
            volume: (parseInt(settingsMap['audio_volume']) || 50) / 100,
            musicVolume: (parseInt(settingsMap['music_volume']) || 50) / 100,
            backgroundMusic: settingsMap['background_music'],
            soundLevel1to3: settingsMap['sound_level_1_3'],
            soundLevel1to3Enabled: settingsMap['sound_level_1_3_enabled'] !== '0',
            soundLevel4to6: settingsMap['sound_level_4_6'],
            soundLevel4to6Enabled: settingsMap['sound_level_4_6_enabled'] !== '0',
            soundLevel7to9: settingsMap['sound_level_7_9'],
            soundLevel7to9Enabled: settingsMap['sound_level_7_9_enabled'] !== '0',
            soundLevel10: settingsMap['sound_level_10'],
            soundLevel10Enabled: settingsMap['sound_level_10_enabled'] !== '0',
            soundLevel10BuildUp: settingsMap['sound_level_10_buildup'],
            soundLevel10BuildUpEnabled: settingsMap['sound_level_10_buildup_enabled'] !== '0',
            soundLevel10Hit: settingsMap['sound_level_10_hit'],
            soundLevel10HitEnabled: settingsMap['sound_level_10_hit_enabled'] !== '0',
            sfxChessSelect: settingsMap['sound_sfx_chess_select'],
            sfxChessSelectEnabled: settingsMap['sound_sfx_chess_select_enabled'] !== '0',
            sfxChessPlace: settingsMap['sound_sfx_chess_place'],
            sfxChessPlaceEnabled: settingsMap['sound_sfx_chess_place_enabled'] !== '0',
            sfxChessCheckmate: settingsMap['sound_sfx_chess_checkmate'],
            sfxChessCheckmateEnabled: settingsMap['sound_sfx_chess_checkmate_enabled'] !== '0',
            sfxChessWrong: settingsMap['sound_sfx_chess_wrong'],
            sfxChessWrongEnabled: settingsMap['sound_sfx_chess_wrong_enabled'] !== '0',
            sfxDismissSnooze: settingsMap['sound_sfx_dismiss_snooze'],
            sfxDismissSnoozeEnabled: settingsMap['sound_sfx_dismiss_snooze_enabled'] !== '0',
            sfxMathCorrect: settingsMap['sound_sfx_math_correct'],
            sfxMathCorrectEnabled: settingsMap['sound_sfx_math_correct_enabled'] !== '0',
            sfxConfetti: settingsMap['sound_sfx_confetti'],
            sfxConfettiEnabled: settingsMap['sound_sfx_confetti_enabled'] !== '0',
            sfxBtnClick: settingsMap['sound_sfx_btn_click'],
            sfxBtnClickEnabled: settingsMap['sound_sfx_btn_click_enabled'] !== '0',
            sfxCheckinSuccess: settingsMap['sound_sfx_checkin_success'],
            sfxCheckinSuccessEnabled: settingsMap['sound_sfx_checkin_success_enabled'] !== '0'
          });
        } catch (audioErr) {
          console.error('Error initializing audio manager in check-in window:', audioErr);
        }
      }

      // Global button click SFX delegation in check-in window
      document.addEventListener('click', (e) => {
        const target = e.target;
        if (target.closest('button') || target.closest('.close-btn') || target.closest('#checkin-btn')) {
          if (window.audioManager) {
            window.audioManager.playBtnClick();
          }
        }
      }, { capture: true });
      
      document.getElementById('streak-num').textContent = `${status.streak} Gün`;
      
      if (status.completed) {
        btn.disabled = true;
        btn.textContent = '✓ Giriş Yapıldı!';
        btn.classList.add('success');
        infoMsg.textContent = 'Harika! Bugünün girişini zaten tamamladın.';
      } else {
        btn.disabled = false;
        btn.textContent = 'Giriş Yap';
        infoMsg.textContent = 'Procrastination ile savaşmak için günlük girişini tamamla!';
      }
      
      renderCalendar(status.streak, history);
    }

    class ConfettiEffect {
      constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.particles = [];
        this.colors = ['#6c47ff', '#00c2d1', '#f5a623', '#22c55e', '#ef4444', '#e879f9'];
        this.animationId = null;
        this.active = false;
      }

      resize() {
        this.canvas.width = this.canvas.parentElement.clientWidth || 400;
        this.canvas.height = this.canvas.parentElement.clientHeight || 500;
      }

      start(durationMs = 4500) {
        this.resize();
        this.canvas.style.display = 'block';
        this.particles = [];
        this.active = true;

        const particleCount = 80;
        for (let i = 0; i < particleCount; i++) {
          this.particles.push(this.createParticle());
        }

        if (this.animationId) {
          cancelAnimationFrame(this.animationId);
        }
        
        const startTime = Date.now();
        const animate = () => {
          if (!this.active) return;
          
          const elapsed = Date.now() - startTime;
          this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
          
          this.particles.forEach((p) => {
            p.vy += p.gravity;
            if (p.vy > p.maxVy) p.vy = p.maxVy;
            
            p.x += p.vx;
            p.y += p.vy;
            p.rotation += p.rotationSpeed;
            p.opacity = Math.max(0, 1 - (elapsed / durationMs));
            
            this.ctx.save();
            this.ctx.translate(p.x, p.y);
            this.ctx.rotate(p.rotation);
            this.ctx.fillStyle = p.color;
            this.ctx.globalAlpha = p.opacity;
            
            // Only draw square/rectangle
            this.ctx.fillRect(-p.width / 2, -p.height / 2, p.width, p.height);
            
            this.ctx.restore();
          });

          if (elapsed < durationMs * 0.7 && this.particles.length < 120 && Math.random() < 0.25) {
            this.particles.push(this.createParticle());
          }
          
          if (elapsed < durationMs) {
            this.animationId = requestAnimationFrame(animate);
          } else {
            this.stop();
          }
        };
        
        this.animationId = requestAnimationFrame(animate);
      }

      createParticle() {
        const size = Math.random() * 8 + 6;
        const width = size;
        const height = size * (Math.random() * 0.4 + 0.8);
        
        return {
          x: Math.random() * this.canvas.width,
          y: -Math.random() * 30 - 10, // above top edge
          vx: Math.random() * 2 - 1, // subtle horizontal drift
          vy: Math.random() * 1 + 0.5, // slow initial speed
          gravity: Math.random() * 0.02 + 0.03, // slow gravity fall
          maxVy: Math.random() * 1.5 + 1.5,
          width,
          height,
          rotation: Math.random() * Math.PI * 2,
          rotationSpeed: Math.random() * 0.04 - 0.02, // slow rotate
          color: this.colors[Math.floor(Math.random() * this.colors.length)],
          opacity: 1
        };
      }

      stop() {
        this.active = false;
        if (this.animationId) {
          cancelAnimationFrame(this.animationId);
          this.animationId = null;
        }
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        this.canvas.style.display = 'none';
      }
    }

    let confettiEffect = null;

    async function doCheckin() {
      btn.disabled = true;
      btn.textContent = '⏳ Giriş Yapılıyor...';
      
      try {
        let result = { ok: true, streak: 1 };
        if (window.electronAPI && window.electronAPI.checkinDo) {
          result = await window.electronAPI.checkinDo();
        }
        
        btn.textContent = '✓ Giriş Yapıldı!';
        btn.classList.add('success');
        
        document.getElementById('streak-num').textContent = `${result.streak} Gün`;
        infoMsg.textContent = 'Harika! Bugünün girişini başarıyla tamamladın.';
        
        const todayCircle = document.getElementById('today-circle');
        if (todayCircle) {
          todayCircle.className = 'day-circle completed animate-checkin';
        }

        // Play check-in success sound
        if (window.audioManager) {
          window.audioManager.playCheckinSuccess();
        }
        
        // Trigger confetti!
        if (confettiEffect) {
          confettiEffect.start(4500);
        }
        
        setTimeout(() => {
          if (window.electronAPI && window.electronAPI.closeCheckin) {
            window.electronAPI.closeCheckin();
          }
        }, 1500);
        
      } catch (err) {
        console.error('Error during check-in:', err);
        btn.disabled = false;
        btn.textContent = 'Giriş Yap';
        infoMsg.textContent = 'Hata oluştu, lütfen tekrar deneyin.';
        infoMsg.style.color = '#ef4444';
      }
    }

    btn.addEventListener('click', doCheckin);
    closeBtn.addEventListener('click', () => {
      if (window.electronAPI && window.electronAPI.closeCheckin) {
        window.electronAPI.closeCheckin();
      }
    });

    document.addEventListener('DOMContentLoaded', async () => {
      await initialize();
      const canvas = document.getElementById('confetti-canvas');
      if (canvas) {
        confettiEffect = new ConfettiEffect(canvas);
      }
    });
  </script>
  <canvas id="confetti-canvas"></canvas>
</body>
</html>
