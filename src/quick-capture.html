<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Capture</title>
  <link rel="stylesheet" href="styles/variables.css">
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      background: transparent;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text-primary);
      overflow: hidden;
    }
    .quick-capture {
      margin: 10px;
      padding: 14px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent-cyan);
      border-radius: 8px;
      box-shadow: var(--shadow-lg);
      -webkit-app-region: drag;
    }
    .quick-capture-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 13px;
      font-weight: 700;
    }
    .quick-capture-header button,
    .quick-capture-actions button,
    textarea {
      -webkit-app-region: no-drag;
    }
    textarea {
      width: 100%;
      min-height: 86px;
      resize: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font: inherit;
      outline: none;
    }
    textarea:focus { border-color: var(--accent-cyan); }
    .quick-capture-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 10px;
    }
    button {
      border: 0;
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 600;
    }
    .close-btn { background: transparent; color: var(--text-muted); padding: 4px 8px; }
    .cancel-btn { background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border); }
    .save-btn { background: var(--accent-cyan); color: white; }
    .status { min-height: 16px; margin-top: 6px; font-size: 12px; color: var(--text-muted); }
  </style>
</head>
<body>
  <form class="quick-capture" id="quick-capture-form">
    <div class="quick-capture-header">
      <span>Quick Capture</span>
      <button type="button" class="close-btn" id="quick-capture-close">X</button>
    </div>
    <textarea id="quick-capture-input" placeholder="Yapılacaklar'a hızlı not ekle..." autofocus></textarea>
    <div class="status" id="quick-capture-status"></div>
    <div class="quick-capture-actions">
      <button type="button" class="cancel-btn" id="quick-capture-cancel">İptal</button>
      <button type="submit" class="save-btn" id="quick-capture-save">Kaydet</button>
    </div>
  </form>
  <script src="js/quick-capture.js"></script>
</body>
</html>
